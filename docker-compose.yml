services:
  # 1. API - Sentinel
  api:
    build: ./sentinel-api
    container_name: sentinel-api-v3
    ports:
      - "8000:8000"
    env_file:
      - ./sentinel-api/.env
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 256M
          
  # 2. Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    environment:
      # Instala Infinity para leer la API
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana_data: