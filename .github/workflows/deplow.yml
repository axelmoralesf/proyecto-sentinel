name: Pipeline CI/CD Sentinel

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # INTEGRACIÓN CONTINUA (CI)
  # ==========================================
  integracion:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar herramientas de prueba
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Aquí instalamos las dependencias de tu API para que el linter las entienda
          if [ -f sentinel-api/requirements.txt ]; then pip install -r sentinel-api/requirements.txt; fi

      - name: Análisis de Código (Linting)
        run: |
          # Revisa que no haya errores críticos de sintaxis en tu API antes de desplegar
          flake8 sentinel-api/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ==========================================
  # DESPLIEGUE CONTINUO (CD)
  # ==========================================
  despliegue:
    needs: integracion # Solo se ejecuta si la etapa de integración pasó sin errores
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el código validado
        uses: actions/checkout@v4

      - name: Transferir archivos a AWS (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }} 
          source: "docker-compose.yml,sentinel-api/"
          target: "~/proyecto-sentinel"

      - name: Desplegar Ecosistema en EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/proyecto-sentinel
            
            # 1. Inyectamos la llave secreta real en el servidor de producción
            echo "SENTINEL_API_KEY=${{ secrets.API_SECRET_KEY }}" > sentinel-api/.env
            
            # 2. Levantamos la infraestructura con Docker Compose
            # (El --build asegura que la API se actualice, la BD no perderá datos)
            docker compose up -d --build api db